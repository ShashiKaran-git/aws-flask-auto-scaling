name: CI/CD Flask App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔐 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🏷️ Set unique image tag
    - name: Set image tag
      run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    # 🐳 Build Docker image
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ env.IMAGE_TAG }} .

    # 📦 Push Docker image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ env.IMAGE_TAG }}

    # ☁️ Configure AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 🔗 Connect to EKS
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ap-south-1 --name flask-cluster

    # 🚀 Deploy (update image in Kubernetes)
    - name: Deploy to EKS
      run: |
        kubectl set image deployment/flask-deployment \
        flask-container=${{ secrets.DOCKER_USERNAME }}/flask-app:${{ env.IMAGE_TAG }}